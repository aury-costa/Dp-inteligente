
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DP-Inteligente v4</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
<h2>DP‑Inteligente</h2>

<button data-page="dashboard">🏠 Início</button>
<button data-page="scan">📷 Digitalizar</button>
<button data-page="arquivo">🔎 Arquivo</button>
<button data-page="assinaturas">✍ Assinaturas</button>
<button data-page="colaboradores">👥 Colaboradores</button>
<button data-page="auditoria">📜 Auditoria</button>
</div>

<div class="content">

<section id="dashboard" class="page">
<h1>Dashboard</h1>
<div id="stats"></div>
</section>

<section id="scan" class="page hidden">
<h1>Digitalizar Documento</h1>

<input type="file" id="fileInput" accept="image/*,.pdf">
<button id="scanBtn">Processar documento</button>

<div id="preview"></div>

<div class="meta">
<label>Nome colaborador</label>
<input id="nome">

<label>CPF</label>
<input id="cpf">

<label>Tipo documento</label>
<input id="tipo">

<label>Data</label>
<input id="data">

<button id="saveDoc">Salvar documento</button>
</div>

</section>

<section id="arquivo" class="page hidden">
<h1>Busca Inteligente</h1>
<input id="search" placeholder="Nome, CPF ou texto...">
<div id="results"></div>
</section>

<section id="assinaturas" class="page hidden">
<h1>Assinaturas</h1>
<canvas id="signPad"></canvas>
<button id="clearSign">Limpar</button>
<button id="saveSign">Salvar assinatura</button>
</section>

<section id="colaboradores" class="page hidden">
<h1>Colaboradores</h1>
<div id="listaColab"></div>
</section>

<section id="auditoria" class="page hidden">
<h1>Logs do Sistema</h1>
<div id="logs"></div>
</section>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
